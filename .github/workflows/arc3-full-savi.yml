name: ARC-AGI-3 full SAVI benchmark

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/arc3-full-savi.yml"
      - "tools/arc3_extract_scorecard.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arc3-full-${{ github.ref }}
  cancel-in-progress: false

env:
  ARC_API_KEY: ${{ secrets.ARC_API_KEY }}
  SAVI_API_BASE: ${{ secrets.SAVI_API_BASE }}
  SAVI_API_PATH: ${{ secrets.SAVI_API_PATH }}
  SAVI_API_KEY: ${{ secrets.SAVI_API_KEY }}
  SAVI_MODEL: ${{ secrets.SAVI_MODEL }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Check required credentials without exposing values
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          required = ["ARC_API_KEY", "SAVI_API_BASE", "SAVI_API_KEY", "SAVI_MODEL"]
          present = {name: bool(os.getenv(name, "").strip()) for name in required}
          ready = all(present.values())
          with open("arc3_preflight.json", "w") as f:
              json.dump({"required_secret_presence": present, "ready": ready}, f, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ready={'true' if ready else 'false'}\n")
          print(json.dumps({"required_secret_presence": present, "ready": ready}, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: arc3-preflight
          path: arc3_preflight.json

      - name: Stop when credentials are missing
        if: steps.check.outputs.ready != 'true'
        run: |
          echo "ARC-AGI-3 run cannot start until ARC_API_KEY and SAVI endpoint secrets are configured."
          exit 1

  savi-full:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and clone official ARC-AGI-3 benchmark
        shell: bash
        run: |
          python -m pip install --upgrade pip uv requests pyyaml
          git clone --depth 1 https://github.com/arcprize/arc-agi-3-benchmarking.git arc3-benchmarking
          cd arc3-benchmarking
          uv sync

      - name: Create runtime-only SAVI endpoint config
        shell: bash
        run: |
          python - <<'PY'
          import os, pathlib, yaml
          root = pathlib.Path("arc3-benchmarking")
          cfg_path = root / "benchmarking" / "model_configs.yaml"
          entries = yaml.safe_load(cfg_path.read_text())
          raw_base = os.environ["SAVI_API_BASE"].rstrip("/")
          api_path = (os.environ.get("SAVI_API_PATH") or "/chat/completions").strip()
          if not api_path.startswith("/"):
              api_path = "/" + api_path
          suffixes = [api_path.rstrip("/"), "/chat/completions"]
          base = raw_base
          for suffix in suffixes:
              if suffix and base.endswith(suffix):
                  base = base[:-len(suffix)].rstrip("/")
                  break
          entries.append({
              "id": "savi-runtime",
              "agent": {
                  "MAX_ACTIONS_BASELINE_MULTIPLIER": 5.0,
                  "MAX_CONTEXT_LENGTH": 175000,
                  "MAX_RETRIES": 5,
              },
              "runtime": {
                  "sdk": "openai-python",
                  "api": "chat_completions",
                  "state": "manual_rolling",
              },
              "client": {
                  "base_url": base,
                  "api_key_env": "SAVI_API_KEY",
              },
              "request": {
                  "model": os.environ["SAVI_MODEL"],
                  "max_tokens": 8192,
              },
              "pricing": {},
          })
          cfg_path.write_text(yaml.safe_dump(entries, sort_keys=False))
          print("Runtime config created for model:", os.environ["SAVI_MODEL"])
          print("Endpoint base configured:", bool(base))
          PY

      - name: Create public-safe SAVI ARC wrapper
        shell: bash
        run: |
          cat > arc3-benchmarking/run_savi.py <<'PY'
          import os
          import main as arc_main
          from benchmarking.agent import BenchmarkingAgent

          original = BenchmarkingAgent._build_system_prompt
          PUBLIC_SAVI_ARC_PROMPT = """SAVI interactive reasoning discipline:
          Maintain a compact explicit state model: objects, controllable entities, goals, obstacles, action effects, level changes, and unresolved hypotheses.
          On each turn use an observe -> update -> predict -> act -> verify loop.
          Distinguish directly observed facts from hypotheses. Prefer actions that either advance the goal or efficiently discriminate between competing hypotheses.
          Treat failed moves, animation, score changes, newly available actions, and level transitions as evidence. Do not repeat an unsuccessful action without a changed rationale.
          Preserve the action budget, plan several steps ahead when the mechanics are sufficiently known, and re-plan immediately when an observed outcome differs from prediction.
          Keep persistent notes concise. End every response with exactly one valid available action; the final action mentioned is the action that will execute."""

          def savi_system_prompt(self):
              private_addendum = os.getenv("SAVI_ARC_SYSTEM_PROMPT", "").strip()
              parts = [PUBLIC_SAVI_ARC_PROMPT]
              if private_addendum:
                  parts.append(private_addendum)
              parts.append(original(self))
              return "\n\n".join(parts)

          BenchmarkingAgent._build_system_prompt = savi_system_prompt
          os.environ["TESTING"] = "False"
          arc_main.main()
          PY

      - name: List available games
        working-directory: arc3-benchmarking
        shell: bash
        run: uv run main.py --list-games | tee ../savi_games.txt

      - name: Run SAVI across the full available ARC-AGI-3 public set
        working-directory: arc3-benchmarking
        shell: bash
        run: |
          set -o pipefail
          uv run python run_savi.py --config=savi-runtime --tags=savi-v6.2.2,full-public,matched-model 2>&1 | tee ../savi_arc3.log

      - name: Extract scorecard and run summary
        if: always()
        shell: bash
        run: |
          python tools/arc3_extract_scorecard.py \
            --log savi_arc3.log \
            --output savi_arc3_summary.json \
            --label "SAVI v6.2.2"

      - name: Copy recordings
        if: always()
        shell: bash
        run: |
          mkdir -p savi_recordings
          cp -R arc3-benchmarking/recordings/. savi_recordings/ 2>/dev/null || true
          cp arc3-benchmarking/logs.log savi_internal_logs.log 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arc3-full-savi
          retention-days: 30
          path: |
            savi_arc3.log
            savi_internal_logs.log
            savi_arc3_summary.json
            savi_games.txt
            savi_recordings/
          if-no-files-found: warn

  matched-baseline:
    needs: [preflight, savi-full]
    if: always() && needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv and clone official ARC-AGI-3 benchmark
        shell: bash
        run: |
          python -m pip install --upgrade pip uv requests pyyaml
          git clone --depth 1 https://github.com/arcprize/arc-agi-3-benchmarking.git arc3-benchmarking
          cd arc3-benchmarking
          uv sync

      - name: Create the identical runtime config without SAVI prompting
        shell: bash
        run: |
          python - <<'PY'
          import os, pathlib, yaml
          root = pathlib.Path("arc3-benchmarking")
          cfg_path = root / "benchmarking" / "model_configs.yaml"
          entries = yaml.safe_load(cfg_path.read_text())
          raw_base = os.environ["SAVI_API_BASE"].rstrip("/")
          api_path = (os.environ.get("SAVI_API_PATH") or "/chat/completions").strip()
          if not api_path.startswith("/"):
              api_path = "/" + api_path
          base = raw_base
          for suffix in [api_path.rstrip("/"), "/chat/completions"]:
              if suffix and base.endswith(suffix):
                  base = base[:-len(suffix)].rstrip("/")
                  break
          entries.append({
              "id": "savi-runtime",
              "agent": {
                  "MAX_ACTIONS_BASELINE_MULTIPLIER": 5.0,
                  "MAX_CONTEXT_LENGTH": 175000,
                  "MAX_RETRIES": 5,
              },
              "runtime": {
                  "sdk": "openai-python",
                  "api": "chat_completions",
                  "state": "manual_rolling",
              },
              "client": {
                  "base_url": base,
                  "api_key_env": "SAVI_API_KEY",
              },
              "request": {
                  "model": os.environ["SAVI_MODEL"],
                  "max_tokens": 8192,
              },
              "pricing": {},
          })
          cfg_path.write_text(yaml.safe_dump(entries, sort_keys=False))
          print("Matched baseline runtime config created for model:", os.environ["SAVI_MODEL"])
          PY

      - name: Run official unmodified agent across the same full public set
        working-directory: arc3-benchmarking
        shell: bash
        run: |
          set -o pipefail
          uv run main.py --config=savi-runtime --tags=matched-baseline,full-public,same-model 2>&1 | tee ../baseline_arc3.log

      - name: Extract scorecard and run summary
        if: always()
        shell: bash
        run: |
          python tools/arc3_extract_scorecard.py \
            --log baseline_arc3.log \
            --output baseline_arc3_summary.json \
            --label "Matched host-model baseline"

      - name: Copy recordings
        if: always()
        shell: bash
        run: |
          mkdir -p baseline_recordings
          cp -R arc3-benchmarking/recordings/. baseline_recordings/ 2>/dev/null || true
          cp arc3-benchmarking/logs.log baseline_internal_logs.log 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arc3-full-matched-baseline
          retention-days: 30
          path: |
            baseline_arc3.log
            baseline_internal_logs.log
            baseline_arc3_summary.json
            baseline_recordings/
          if-no-files-found: warn
