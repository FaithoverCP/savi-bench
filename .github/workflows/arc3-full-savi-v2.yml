name: ARC-AGI-3 SAVI valid full benchmark

on:
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/arc3-full-savi-v2.yml"
      - "tools/arc3_extract_scorecard.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: arc3-valid-full-${{ github.ref }}
  cancel-in-progress: false

env:
  ARC_API_KEY: ${{ secrets.ARC_API_KEY }}
  SAVI_API_BASE: ${{ secrets.SAVI_API_BASE }}
  SAVI_API_KEY: ${{ secrets.SAVI_API_KEY }}
  SAVI_MODEL: ${{ secrets.SAVI_MODEL }}

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Validate required credentials without exposing values
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          required = ["ARC_API_KEY", "SAVI_API_BASE", "SAVI_API_KEY", "SAVI_MODEL"]
          present = {name: bool(os.getenv(name, "").strip()) for name in required}
          ready = all(present.values())
          with open("arc3_v2_preflight.json", "w") as f:
              json.dump({"required_secret_presence": present, "ready": ready}, f, indent=2)
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"ready={'true' if ready else 'false'}\n")
          print(json.dumps({"required_secret_presence": present, "ready": ready}, indent=2))
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: arc3-v2-preflight
          path: arc3_v2_preflight.json

      - name: Stop when credentials are missing
        if: steps.check.outputs.ready != 'true'
        run: exit 1

  benchmark:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install official ARC-AGI-3 benchmark
        shell: bash
        run: |
          python -m pip install --upgrade pip uv requests pyyaml
          git clone --depth 1 https://github.com/arcprize/arc-agi-3-benchmarking.git arc3-benchmarking
          cd arc3-benchmarking
          uv sync

      - name: Create matched GPT runtime configuration
        shell: bash
        run: |
          python - <<'PY'
          import os, pathlib, yaml
          cfg_path = pathlib.Path("arc3-benchmarking/benchmarking/model_configs.yaml")
          entries = yaml.safe_load(cfg_path.read_text())
          base = os.environ["SAVI_API_BASE"].rstrip("/")
          for suffix in ("/chat/completions",):
              if base.endswith(suffix):
                  base = base[:-len(suffix)].rstrip("/")
          entries.append({
              "id": "savi-runtime-v2",
              "agent": {
                  "MAX_ACTIONS_BASELINE_MULTIPLIER": 5.0,
                  "MAX_CONTEXT_LENGTH": 175000,
                  "MAX_RETRIES": 5,
              },
              "runtime": {
                  "sdk": "openai-python",
                  "api": "chat_completions",
                  "state": "manual_rolling",
              },
              "client": {
                  "base_url": base,
                  "api_key_env": "SAVI_API_KEY",
              },
              "request": {
                  "model": os.environ["SAVI_MODEL"],
                  "max_completion_tokens": 8192,
              },
              "pricing": {},
          })
          cfg_path.write_text(yaml.safe_dump(entries, sort_keys=False))
          print("Configured model:", os.environ["SAVI_MODEL"])
          print("Configured API base:", base)
          PY

      - name: Create public-safe SAVI ARC profile
        shell: bash
        run: |
          cat > arc3-benchmarking/run_savi.py <<'PY'
          import os
          import main as arc_main
          from benchmarking.agent import BenchmarkingAgent

          original = BenchmarkingAgent._build_system_prompt
          SAVI_ARC_PROFILE = """SAVI interactive reasoning discipline:
          Maintain a compact explicit state model covering objects, controllable entities, goals, obstacles, action effects, level changes, and unresolved hypotheses.
          Use an observe -> update -> predict -> act -> verify cycle on every turn.
          Distinguish observations from hypotheses. Prefer actions that advance the objective or efficiently discriminate among competing hypotheses.
          Treat failed moves, animation, score changes, newly available actions, and level transitions as evidence.
          Do not repeat an unsuccessful action without a changed rationale.
          Preserve the action budget, plan ahead when mechanics are sufficiently known, and re-plan when results differ from prediction.
          Keep persistent notes concise. End every response with exactly one valid available action; the final action mentioned is executed."""

          def savi_system_prompt(self):
              return SAVI_ARC_PROFILE + "\n\n" + original(self)

          BenchmarkingAgent._build_system_prompt = savi_system_prompt
          os.environ["TESTING"] = "False"
          arc_main.main()
          PY

      - name: List available public games
        working-directory: arc3-benchmarking
        shell: bash
        run: uv run main.py --list-games | tee ../arc3_games_v2.txt

      - name: Run SAVI condition
        id: savi_run
        working-directory: arc3-benchmarking
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run python run_savi.py --config=savi-runtime-v2 --tags=savi-v6.2.2,full-public,valid-v2 2>&1 | tee ../savi_arc3_v2.log

      - name: Preserve SAVI recordings and summarize
        if: always()
        shell: bash
        run: |
          mkdir -p savi_recordings_v2
          cp -R arc3-benchmarking/recordings/. savi_recordings_v2/ 2>/dev/null || true
          cp arc3-benchmarking/logs.log savi_internal_v2.log 2>/dev/null || true
          python tools/arc3_extract_scorecard.py \
            --log savi_arc3_v2.log \
            --output savi_arc3_v2_summary.json \
            --label "SAVI v6.2.2 ARC profile" || true
          rm -rf arc3-benchmarking/recordings
          mkdir -p arc3-benchmarking/recordings

      - name: Run matched host-model baseline
        id: baseline_run
        if: always()
        working-directory: arc3-benchmarking
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          uv run main.py --config=savi-runtime-v2 --tags=matched-baseline,full-public,valid-v2 2>&1 | tee ../baseline_arc3_v2.log

      - name: Preserve baseline recordings and summarize
        if: always()
        shell: bash
        run: |
          mkdir -p baseline_recordings_v2
          cp -R arc3-benchmarking/recordings/. baseline_recordings_v2/ 2>/dev/null || true
          cp arc3-benchmarking/logs.log baseline_internal_v2.log 2>/dev/null || true
          python tools/arc3_extract_scorecard.py \
            --log baseline_arc3_v2.log \
            --output baseline_arc3_v2_summary.json \
            --label "Matched host-model baseline" || true

      - name: Build matched comparison
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, pathlib

          def load(path):
              p = pathlib.Path(path)
              return json.loads(p.read_text()) if p.exists() else {}

          def metric(summary, name, default=None):
              raw = summary.get("raw_scorecard") or {}
              return raw.get(name, default) if isinstance(raw, dict) else default

          savi = load("savi_arc3_v2_summary.json")
          base = load("baseline_arc3_v2_summary.json")
          s_score = metric(savi, "score")
          b_score = metric(base, "score")
          comparison = {
              "schema": "savi.arc_agi_3.matched_comparison.v2",
              "model": "configured by SAVI_MODEL secret",
              "conditions": {
                  "savi": {
                      "score": s_score,
                      "total_environments_completed": metric(savi, "total_environments_completed"),
                      "total_environments": metric(savi, "total_environments"),
                      "total_levels_completed": metric(savi, "total_levels_completed"),
                      "total_levels": metric(savi, "total_levels"),
                      "total_actions": metric(savi, "total_actions"),
                      "scorecard_url": savi.get("scorecard_url"),
                      "exit_reason_counts": savi.get("exit_reason_counts", {}),
                  },
                  "baseline": {
                      "score": b_score,
                      "total_environments_completed": metric(base, "total_environments_completed"),
                      "total_environments": metric(base, "total_environments"),
                      "total_levels_completed": metric(base, "total_levels_completed"),
                      "total_levels": metric(base, "total_levels"),
                      "total_actions": metric(base, "total_actions"),
                      "scorecard_url": base.get("scorecard_url"),
                      "exit_reason_counts": base.get("exit_reason_counts", {}),
                  },
                  "absolute_score_uplift": (s_score - b_score) if isinstance(s_score, (int, float)) and isinstance(b_score, (int, float)) else None,
                  "relative_score_uplift_percent": ((s_score - b_score) / b_score * 100) if isinstance(s_score, (int, float)) and isinstance(b_score, (int, float)) and b_score else None,
              },
          }
          pathlib.Path("arc3_matched_comparison_v2.json").write_text(json.dumps(comparison, indent=2))
          print(json.dumps(comparison, indent=2))
          PY

      - name: Upload all benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arc3-valid-full-savi-vs-baseline
          retention-days: 30
          path: |
            arc3_games_v2.txt
            savi_arc3_v2.log
            savi_internal_v2.log
            savi_arc3_v2_summary.json
            savi_recordings_v2/
            baseline_arc3_v2.log
            baseline_internal_v2.log
            baseline_arc3_v2_summary.json
            baseline_recordings_v2/
            arc3_matched_comparison_v2.json
          if-no-files-found: warn

      - name: Enforce result validity
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import json, pathlib, sys
          comp = json.loads(pathlib.Path("arc3_matched_comparison_v2.json").read_text())
          s = comp["conditions"]["savi"]
          b = comp["conditions"]["baseline"]
          errors = []
          for label, item in (("SAVI", s), ("baseline", b)):
              if not item.get("scorecard_url"):
                  errors.append(f"{label}: missing official scorecard URL")
              if not isinstance(item.get("total_actions"), int) or item.get("total_actions", 0) <= 0:
                  errors.append(f"{label}: zero actions; run is not a valid capability measurement")
              agent_errors = item.get("exit_reason_counts", {}).get("ExitReason.AGENT_ERROR", 0)
              if agent_errors == item.get("total_environments") and agent_errors:
                  errors.append(f"{label}: every environment ended in AGENT_ERROR")
          if errors:
              print("INVALID BENCHMARK RESULT")
              print("\n".join(errors))
              sys.exit(1)
          print("VALID BENCHMARK RESULT: both conditions executed actions and produced scorecards")
          PY
